<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     xmlns:custom="http://example.com/custom-ns"
     viewBox="0 0 300 300" width="300" height="300">
  <title>Mixed test SVG</title>
  <desc>Real-world style with a few issues</desc>

  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef3c7" />
      <stop offset="100%" stop-color="#f59e0b" />
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="2" />
    </filter>
  </defs>

  <rect x="0" y="0" width="300" height="300" fill="url(#g1)" />

  <g filter="url(#blur1)">
    <circle cx="150" cy="150" r="80" fill="#ef4444" />
  </g>

  <customElement custom:attr="something" x="10" y="10">
    Unknown element — should be stripped as warning
  </customElement>

  <weirdShape points="50,50 100,100 150,50" fill="green" />

  <text x="150" y="280" text-anchor="middle" font-size="18">Sample SVG</text>

  <a href="https://commons.wikimedia.org/">
    <rect x="220" y="10" width="70" height="30" fill="#3b82f6" />
    <text x="255" y="30" text-anchor="middle" fill="white" font-size="14">Link OK</text>
  </a>

  <a href="javascript:void(0)">
    <text x="50" y="280" fill="purple">Bad link</text>
  </a>
</svg>