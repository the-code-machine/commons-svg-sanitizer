<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 200 200" width="200" height="200"
     onload="alert('XSS via onload')">
  <title>Malicious test SVG</title>

  <script type="text/javascript">
    alert('XSS via script tag');
  </script>

  <foreignObject x="0" y="0" width="200" height="200">
    <body xmlns="http://www.w3.org/1999/xhtml">
      <p>Hostile foreignObject content</p>
    </body>
  </foreignObject>

  <rect x="10" y="10" width="80" height="80" fill="red"
        onclick="alert('XSS via onclick')"
        onmouseover="alert('XSS via onmouseover')" />

  <a xlink:href="javascript:alert('XSS via href')">
    <circle cx="150" cy="50" r="30" fill="blue" />
  </a>

  <text x="100" y="180" style="background: expression(alert('XSS via CSS'))">
    Bad style
  </text>

  <iframe src="https://evil.example.com/" width="100" height="100" />

  <embed src="data:text/html,&lt;script&gt;alert(1)&lt;/script&gt;" />
</svg>